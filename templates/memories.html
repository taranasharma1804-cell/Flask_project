<!DOCTYPE html>
<html>
<head>

<title>Memories</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
text-align:center;
}

/* title spacing */

h1{
margin-bottom:10px;
}

/* video container */

.video-wrapper{
display:flex;
justify-content:center;
align-items:center;
margin:10px 0;
}

/* video */

.video-box{
width:300px;
height:auto;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);

/* rotate video */

transform:rotate(-90deg);
}

/* button spacing */

.button-area{
margin-top:15px;
}

button{
padding:10px 22px;
font-size:16px;
border:none;
border-radius:8px;
background:#ff6fa5;
color:white;
cursor:pointer;
}

button:hover{
background:#ff4c8a;
}

/* mobile adjustments */

@media(max-width:768px){

.video-box{
width:240px;
}

}

</style>

</head>

<body class="center">


<h1>Beautiful Memories 💫</h1>

<div class="video-wrapper">
<video id="videoPlayer" class="video-box" autoplay muted controls></video>
</div>

<div class="button-area">
<a href="/message">
<button>Final Message 💌</button>
</a>
</div>

<script>

let videos=[
"{{ url_for('static', filename='videos/video1.mp4') }}",
"{{ url_for('static', filename='videos/video2.mp4') }}"
];

let index=0;

let player=document.getElementById("videoPlayer");

function playVideo(){
player.src=videos[index];
player.load();
player.play();
}

player.addEventListener("ended",function(){

index++;

if(index>=videos.length){
index=0;
}

playVideo();

});

playVideo();

</script>

</body>
</html>
